name: Publish snapshot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    if: github.repository == 'ksharma-xyz/aagya'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish snapshot to Sonatype
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -z "$ORG_GRADLE_PROJECT_mavenCentralUsername" ]; then
            echo "::notice::Sonatype secrets not configured yet. Skipping snapshot publication."
            echo "::notice::Add SONATYPE_USERNAME, SONATYPE_PASSWORD, SIGNING_KEY, SIGNING_KEY_PASSWORD"
            echo "::notice::in repo settings to enable. See TODO.md / docs/publishing.md."
            exit 0
          fi
          ./gradlew publishToMavenCentral --no-configuration-cache --stacktrace
