site_name: Aagya
site_description: Kotlin Multiplatform permissions library for Android and iOS.
site_url: https://ksharma-xyz.github.io/aagya/
repo_url: https://github.com/ksharma-xyz/aagya
repo_name: ksharma-xyz/aagya
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Karan Sharma. Apache-2.0.

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ksharma-xyz/aagya
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Permission model: concepts/permission-model.md
      - Storage policies: concepts/storage-policies.md
  - Recipes:
      - Basic location permission: recipes/basic-location-permission.md
      - Stricter "ask once" policy: recipes/stricter-policy.md
      - Custom storage adapter: recipes/custom-storage.md
      - Koin DI integration: recipes/koin.md
  - Advanced:
      - Crash handling: advanced/crash-handling.md
      - Testing: advanced/testing.md
      - Extending to new permissions: advanced/extending.md
  - Publishing: publishing.md
  - Changelog: changelog.md
